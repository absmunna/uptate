<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paikar Mart — Bangladesh's Social Commerce Super App</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:red; padding:20px; z-index:9999; font-family:monospace; overflow:auto;"></div>
    <script>
      const isWebSocketError = (msg) => {
        const errorStr = (typeof msg === 'string' ? msg : (msg?.message || "")).toLowerCase();
        return errorStr.includes('websocket') || errorStr.includes('failed to connect');
      };
      window.onerror = function(msg, url, line, col, error) {
        if (isWebSocketError(msg)) return;
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerHTML += '<br>' + msg + ' at ' + line + ':' + col;
      };
      window.addEventListener("unhandledrejection", function(event) {
        if (isWebSocketError(event.reason)) return;
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerHTML += '<br>Unhandled Promise Rejection: ' + event.reason;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
